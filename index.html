<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400;500&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>
  
    *,*::after,*::before{padding:0;margin:0;box-sizing:border-box;}

    :root {
      --dark-color: #000;
      --teal: #39c6d6;
      --teal-deep: #14757a;
      --teal-light: #a7ffee;
      --glow: #6bf0ff;
      --gold: #ffce00;
      --rose: #ff6eb4;
      --violet: #b06aff;
      --amber: #ffaa33;
    }

    body {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--dark-color);
      overflow: hidden;
      perspective: 1200px;
      margin: 0;
    }

    .dusk {
      position: fixed;
      left: 50%; top: 0;
      transform: translateX(-50%);
      width: 100%; height: 100%;
      background-image:
        radial-gradient(ellipse 80% 40% at 70% 100%, rgba(57,198,214,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 30% 80%, rgba(176,106,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at top, transparent 0%, var(--dark-color) 60%),
        radial-gradient(ellipse at bottom, var(--dark-color), rgba(145,233,255,0.15)),
        repeating-linear-gradient(220deg, black 0px, black 19px, transparent 19px, transparent 22px),
        repeating-linear-gradient(189deg, black 0px, black 19px, transparent 19px, transparent 22px),
        repeating-linear-gradient(148deg, black 0px, black 19px, transparent 19px, transparent 22px),
        linear-gradient(90deg, #00fffa, #e0f0ff);
    }

    .dusk-depth {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 35% at 22% 55%, rgba(10,60,80,0.45) 0%, transparent 65%),
        radial-gradient(ellipse 40% 50% at 78% 30%, rgba(20,10,50,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 70% 20% at 50% 100%, rgba(0,40,50,0.6) 0%, transparent 80%);
      pointer-events: none;
      z-index: 1;
    }

    .pollen-field {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }
    .pollen {
      position: absolute;
      border-radius: 50%;
      animation: pollen-drift linear infinite;
    }

    @keyframes pollen-drift {
      0%   { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
      10%  { opacity: 1; transform: translateY(85vh) translateX(5px) scale(1); }
      50%  { transform: translateY(45vh) translateX(-8px) scale(1); opacity: 0.8; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(12px) scale(0.5); opacity: 0; }
    }

    .login-wrapper {
      position: fixed;
      top: 50%;
      left: 6vw;
      transform: translateY(-50%);
      z-index: 200;
      animation: panel-bloom 1.4s 0.6s cubic-bezier(0.22, 1, 0.36, 1) backwards;
    }
    @keyframes panel-bloom {
      0% { opacity: 0; transform: translateY(-42%) scale(0.82); filter: blur(12px); }
    }

    .login-wrapper::before {
      content: "";
      position: absolute;
      top: -38px; left: -18px;
      width: 70px; height: 80px;
      border-top-left-radius: 100%;
      border-left: 2px solid rgba(57,198,214,0.45);
      border-top: 1px solid rgba(57,198,214,0.25);
      pointer-events: none;
      animation: vine-sway-l 4s ease-in-out infinite;
      transform-origin: bottom right;
      filter: drop-shadow(0 0 4px rgba(57,198,214,0.3));
    }
    .login-wrapper::after {
      content: "";
      position: absolute;
      bottom: -30px; right: -14px;
      width: 55px; height: 65px;
      border-bottom-right-radius: 100%;
      border-right: 2px solid rgba(176,106,255,0.40);
      border-bottom: 1px solid rgba(176,106,255,0.20);
      pointer-events: none;
      animation: vine-sway-r 5s 1s ease-in-out infinite;
      transform-origin: top left;
      filter: drop-shadow(0 0 4px rgba(176,106,255,0.25));
    }
    @keyframes vine-sway-l { 0%,100%{transform:rotate(-3deg) scaleX(1);}50%{transform:rotate(2deg) scaleX(1.06);} }
    @keyframes vine-sway-r { 0%,100%{transform:rotate(2deg) scaleX(1);}50%{transform:rotate(-3deg) scaleX(1.04);} }

    .login-card {
      position: relative;
      width: 355px;
      padding: 56px 44px 48px;
      border-radius: 60% 40% 55% 45% / 45% 55% 45% 55%;
      background:
        radial-gradient(ellipse 140% 90% at 25% 15%, rgba(57,198,214,0.13) 0%, transparent 55%),
        radial-gradient(ellipse 100% 120% at 75% 85%, rgba(176,106,255,0.09) 0%, transparent 52%),
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(255,110,180,0.05) 0%, transparent 55%),
        linear-gradient(158deg, rgba(0,32,38,0.92) 0%, rgba(0,14,22,0.95) 40%, rgba(5,0,24,0.93) 100%);
      border: 1px solid transparent;
      background-clip: padding-box;
      box-shadow:
        0 0 0 1px rgba(57,198,214,0.22),
        0 0 0 2px rgba(107,240,255,0.07),
        0 18px 80px rgba(0,0,0,0.8),
        0 0 100px rgba(57,198,214,0.14),
        0 0 180px rgba(176,106,255,0.07),
        inset 0 1px 0 rgba(167,255,238,0.22),
        inset 0 -1px 0 rgba(176,106,255,0.12),
        inset 1px 0 0 rgba(57,198,214,0.10),
        inset -1px 0 0 rgba(255,110,180,0.07);
      backdrop-filter: blur(32px) saturate(1.6) brightness(1.05);
      -webkit-backdrop-filter: blur(32px) saturate(1.6) brightness(1.05);
      overflow: visible;
      transform-style: preserve-3d;
    }

    .login-card::before {
      content: "";
      position: absolute;
      inset: -1.5px;
      border-radius: 61% 41% 56% 46% / 46% 56% 46% 56%;
      background: conic-gradient(
        from var(--border-angle, 0deg),
        rgba(57,198,214,0.95),
        rgba(107,240,255,0.75),
        rgba(176,106,255,0.68),
        rgba(255,110,180,0.62),
        rgba(255,170,51,0.55),
        rgba(167,255,238,0.85),
        rgba(57,198,214,0.95)
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      padding: 1.5px;
      animation: border-spin 7s linear infinite;
      pointer-events: none;
      z-index: -1;
      filter: blur(0.4px);
    }
    @property --border-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
    @keyframes border-spin { to { --border-angle: 360deg; } }

    .login-card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 60% 40% 55% 45% / 45% 55% 45% 55%;
      background: linear-gradient(
        125deg,
        transparent 0%,
        transparent 28%,
        rgba(107,240,255,0.06) 42%,
        rgba(167,255,238,0.09) 50%,
        rgba(107,240,255,0.05) 58%,
        transparent 72%,
        transparent 100%
      );
      background-size: 300% 300%;
      animation: card-sheen 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes card-sheen {
      0%,100% { background-position: 0% 0%; opacity: 0.5; }
      50%     { background-position: 100% 100%; opacity: 1; }
    }

    .card-inner-ring {
      position: absolute;
      inset: 12px;
      border-radius: 58% 42% 53% 47% / 43% 53% 43% 57%;
      border: 1px solid rgba(107,240,255,0.07);
      pointer-events: none;
      z-index: 0;
      animation: inner-ring-pulse 6s ease-in-out infinite;
    }
    @keyframes inner-ring-pulse {
      0%,100%{ border-color: rgba(107,240,255,0.07); }
      50%{ border-color: rgba(107,240,255,0.14); }
    }

    .card-petal-top {
      position: absolute;
      top: -16px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 5px; align-items: center;
    }
    .card-petal-top span {
      display: block; width: 9px; height: 15px;
      border-radius: 51% 49% 47% 53% / 44% 45% 55% 69%;
      background: linear-gradient(to top, var(--teal-deep), var(--teal), var(--teal-light));
      opacity: 0.9;
      box-shadow: 0 0 10px rgba(107,240,255,0.6), 0 0 20px rgba(57,198,214,0.3);
      animation: petal-breathe 3s ease-in-out infinite;
    }
    .card-petal-top span:nth-child(1) { transform: rotateY(40deg) rotateX(-50deg) rotate(-15deg); animation-delay: 0.2s; }
    .card-petal-top span:nth-child(2) { width: 11px; height: 17px; opacity: 1; animation-delay: 0s; }
    .card-petal-top span:nth-child(3) { transform: rotateY(-40deg) rotateX(-50deg) rotate(15deg); animation-delay: 0.4s; }
    .card-petal-top span:nth-child(4) { width: 7px; height: 12px; background: linear-gradient(to top, #5a1040, var(--rose)); box-shadow: 0 0 8px rgba(255,110,180,0.5); animation-delay: 0.6s; }
    .card-petal-top span:nth-child(5) { width: 7px; height: 12px; background: linear-gradient(to top, #2a0850, var(--violet)); box-shadow: 0 0 8px rgba(176,106,255,0.5); animation-delay: 0.8s; }
    @keyframes petal-breathe {
      0%,100%{ transform-origin:bottom center; box-shadow:0 0 10px rgba(107,240,255,0.6),0 0 20px rgba(57,198,214,0.3); }
      50%{ box-shadow:0 0 16px rgba(107,240,255,0.9),0 0 32px rgba(57,198,214,0.5); }
    }

    .card-core {
      width: 11px; height: 7px; border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #fffbe0, var(--gold) 40%, #ff9900 80%);
      box-shadow: 0 0 12px var(--gold), 0 0 24px rgba(255,206,0,0.5);
      margin: 0 3px;
      animation: core-pulse 2s ease-in-out infinite;
    }
    @keyframes core-pulse {
      0%,100%{ box-shadow:0 0 12px var(--gold),0 0 24px rgba(255,206,0,0.5); }
      50%{ box-shadow:0 0 20px var(--gold),0 0 40px rgba(255,206,0,0.7),0 0 60px rgba(255,150,0,0.3); }
    }

    .card-petal-bottom {
      position: absolute;
      bottom: -14px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 4px; align-items: center;
    }
    .card-petal-bottom span {
      display: block; width: 7px; height: 11px;
      border-radius: 51% 49% 47% 53% / 44% 45% 55% 69%;
      opacity: 0.65;
      animation: petal-breathe 3.5s ease-in-out infinite;
    }
    .card-petal-bottom span:nth-child(1) { background: linear-gradient(to bottom, var(--teal-deep), var(--teal)); transform: rotate(180deg) rotateY(30deg); animation-delay: 0.3s; }
    .card-petal-bottom span:nth-child(2) { width: 9px; height: 13px; background: linear-gradient(to bottom, #5a1040, var(--rose)); transform: rotate(180deg); opacity: 0.75; }
    .card-petal-bottom span:nth-child(3) { background: linear-gradient(to bottom, var(--teal-deep), var(--teal)); transform: rotate(180deg) rotateY(-30deg); animation-delay: 0.6s; }

    .card-leaf-left {
      position: absolute;
      left: -22px; top: 38%;
      width: 20px; height: 32px;
      border-top-right-radius: 100%;
      border-bottom-left-radius: 100%;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%),
                  linear-gradient(to top, rgba(8,70,60,0.8), #20906a, rgba(57,198,214,0.8));
      box-shadow: inset 0 0 4px rgba(107,240,255,0.2), 0 0 8px rgba(57,198,214,0.15);
      transform: rotate(-25deg) rotateY(20deg);
      animation: leaf-sway-l 4s ease-in-out infinite;
      pointer-events: none;
    }
    .card-leaf-left::after {
      content: "";
      position: absolute; left: 50%; top: 15%;
      width: 0.5px; height: 70%;
      background: linear-gradient(to top, transparent, rgba(167,255,238,0.6), transparent);
      transform: translateX(-50%) rotate(-5deg);
      border-radius: 1px;
    }
    .card-leaf-right {
      position: absolute;
      right: -20px; top: 48%;
      width: 18px; height: 28px;
      border-top-left-radius: 100%;
      border-bottom-right-radius: 100%;
      background: linear-gradient(135deg, rgba(255,255,255,0.10) 0%, transparent 50%),
                  linear-gradient(to top, rgba(8,70,60,0.7), #20906a, rgba(57,198,214,0.7));
      box-shadow: inset 0 0 4px rgba(107,240,255,0.15), 0 0 6px rgba(57,198,214,0.12);
      transform: rotate(20deg) rotateY(-20deg);
      animation: leaf-sway-r 3.5s 0.8s ease-in-out infinite;
      pointer-events: none;
    }
    .card-leaf-right::after {
      content: "";
      position: absolute; left: 50%; top: 15%;
      width: 0.5px; height: 70%;
      background: linear-gradient(to top, transparent, rgba(167,255,238,0.5), transparent);
      transform: translateX(-50%) rotate(5deg);
      border-radius: 1px;
    }
    @keyframes leaf-sway-l { 0%,100%{transform:rotate(-25deg) rotateY(20deg);}50%{transform:rotate(-20deg) rotateY(22deg) translateY(-2px);} }
    @keyframes leaf-sway-r { 0%,100%{transform:rotate(20deg) rotateY(-20deg);}50%{transform:rotate(16deg) rotateY(-22deg) translateY(-2px);} }

    .card-firefly {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 10;
      animation: card-ff linear infinite;
    }
    @keyframes card-ff {
      0%  { opacity:0; transform:translate(0,0) scale(0.3); }
      8%  { opacity:1; }
      50% { opacity:0.7; }
      92% { opacity:0.4; }
      100%{ opacity:0; transform:translate(var(--ffx,20px),var(--ffy,-80px)) scale(0.2); }
    }

    .login-header { text-align: center; margin-bottom: 34px; margin-top: 14px; position: relative; z-index: 1; }

    .time-greeting {
      font-family: 'Jost', sans-serif; font-weight: 200;
      font-size: 0.58rem; letter-spacing: 0.50em;
      text-transform: uppercase;
      color: rgba(107,240,255,0.55);
      text-align: center; margin-bottom: 10px;
      text-shadow: 0 0 14px rgba(107,240,255,0.45);
    }

    .login-logo-wrap {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .logo-arc {
      position: absolute;
      top: -20px; left: 50%;
      transform: translateX(-50%);
      width: 80px; height: 20px;
      border-top: 1px solid rgba(107,240,255,0.3);
      border-left: 1px solid rgba(107,240,255,0.15);
      border-right: 1px solid rgba(107,240,255,0.15);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      pointer-events: none;
    }
    .logo-arc::before,
    .logo-arc::after {
      content: "";
      position: absolute;
      top: -3px;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(107,240,255,0.8);
      box-shadow: 0 0 6px rgba(107,240,255,0.9);
    }
    .logo-arc::before { left: -2px; }
    .logo-arc::after { right: -2px; }

    .login-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: 3rem;
      letter-spacing: 0.18em;
      color: var(--teal-light);
      line-height: 1;
      text-shadow:
        0 0 25px rgba(107,240,255,0.7),
        0 0 50px rgba(57,198,214,0.35),
        0 0 90px rgba(57,198,214,0.18),
        0 2px 8px rgba(0,0,0,0.8);
      animation: title-glow 4s ease-in-out infinite;
    }
    @keyframes title-glow {
      0%,100%{ text-shadow:0 0 25px rgba(107,240,255,0.7),0 0 50px rgba(57,198,214,0.35),0 0 90px rgba(57,198,214,0.18),0 2px 8px rgba(0,0,0,0.8); }
      50%{ text-shadow:0 0 35px rgba(107,240,255,1),0 0 70px rgba(57,198,214,0.55),0 0 120px rgba(57,198,214,0.28),0 2px 8px rgba(0,0,0,0.8); }
    }
    .login-title em { font-style: italic; color: #fff; }

    .login-title::after {
      content: ""; display: block;
      width: 30px; height: 1.5px;
      background: linear-gradient(to right, transparent, var(--teal), rgba(107,240,255,0.8), var(--teal), transparent);
      margin: 10px auto 0;
      animation: title-line 3.5s ease-in-out infinite;
      box-shadow: 0 0 8px rgba(107,240,255,0.6);
    }
    @keyframes title-line { 0%,100%{width:30px;opacity:0.5;}50%{width:100px;opacity:1;} }

    .login-subtitle {
      font-family: 'Jost', sans-serif; font-weight: 200;
      font-size: 0.65rem; letter-spacing: 0.36em;
      text-transform: uppercase;
      color: rgba(167,255,238,0.42);
      margin-top: 10px;
      text-shadow: 0 0 12px rgba(107,240,255,0.22);
    }

    .login-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.72rem;
      color: rgba(167,255,238,0.28);
      letter-spacing: 0.08em;
      margin-top: 6px;
      animation: tagline-fade 5s ease-in-out infinite alternate;
    }
    @keyframes tagline-fade {
      from { opacity: 0.5; }
      to   { opacity: 1; }
    }

    .divider { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; position: relative; z-index: 1; }
    .divider-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(57,198,214,0.5), rgba(107,240,255,0.3), transparent);
      box-shadow: 0 0 4px rgba(57,198,214,0.2);
    }
    .divider-dot {
      width: 8px; height: 8px;
      border-radius: 51% 49% 47% 53% / 44% 45% 55% 69%;
      background: radial-gradient(circle at 35% 35%, var(--teal-light), var(--teal));
      box-shadow: 0 0 8px var(--teal), 0 0 16px rgba(57,198,214,0.6), 0 0 28px rgba(57,198,214,0.3);
      animation: dot-bloom 2.5s ease-in-out infinite;
    }
    @keyframes dot-bloom {
      0%,100%{ transform:scale(1); box-shadow:0 0 8px var(--teal),0 0 16px rgba(57,198,214,0.6); }
      50%{ transform:scale(1.3); box-shadow:0 0 14px var(--teal),0 0 28px rgba(57,198,214,0.8),0 0 42px rgba(57,198,214,0.4); }
    }

    .field-group { display: flex; flex-direction: column; gap: 20px; margin-bottom: 28px; position: relative; z-index: 1; }
    .field { position: relative; }

    .field-label {
      font-family: 'Jost', sans-serif; font-weight: 300;
      font-size: 0.60rem; letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(107,240,255,0.55);
      margin-bottom: 9px; display: flex; align-items: center; gap: 6px;
      transition: color 0.3s, text-shadow 0.3s;
    }
    .field-label::before {
      content: "";
      display: inline-block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(57,198,214,0.5);
      box-shadow: 0 0 4px rgba(107,240,255,0.5);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .field:focus-within .field-label {
      color: var(--teal-light);
      text-shadow: 0 0 12px rgba(107,240,255,0.55);
    }
    .field:focus-within .field-label::before {
      background: var(--teal);
      box-shadow: 0 0 8px rgba(107,240,255,0.9), 0 0 16px rgba(57,198,214,0.5);
    }

    .field-input {
      width: 100%;
      background: rgba(0,44,50,0.5);
      border: 1px solid rgba(57,198,214,0.30);
      border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
      padding: 14px 22px 14px 20px;
      color: #e8fff8;
      font-family: 'Jost', sans-serif; font-weight: 300;
      font-size: 0.9rem; letter-spacing: 0.07em;
      outline: none;
      transition: border-color 0.4s, box-shadow 0.4s, background 0.4s, border-radius 0.4s;
      position: relative;
      caret-color: var(--teal);
    }
    .field-input::placeholder { color: rgba(167,255,238,0.22); }
    .field-input:focus {
      border-color: rgba(57,198,214,0.80);
      background: rgba(0,65,72,0.58);
      border-radius: 40% 60% 40% 60% / 35% 35% 65% 65%;
      box-shadow:
        0 0 0 3px rgba(57,198,214,0.12),
        0 0 24px rgba(57,198,214,0.22),
        0 0 48px rgba(57,198,214,0.09),
        inset 0 1px 0 rgba(167,255,238,0.15),
        inset 0 -1px 0 rgba(57,198,214,0.08);
    }

    .field-input:not(:placeholder-shown) {
      border-color: rgba(57,198,214,0.45);
      background: rgba(0,52,60,0.52);
    }

    .field::after {
      content: "";
      position: absolute;
      left: 50%; bottom: 0;
      width: 0.5px; height: 0;
      background: linear-gradient(to top, transparent, rgba(107,240,255,0.6), transparent);
      transform: translateX(-50%);
      transition: height 0.4s ease;
      pointer-events: none;
      border-radius: 1px;
    }
    .field:focus-within::after { height: 70%; }

    .field-icon {
      position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%);
      width: 8px; height: 10px;
      border-radius: 51% 49% 47% 53% / 44% 45% 55% 69%;
      background: linear-gradient(to top, var(--teal-deep), var(--teal-light));
      box-shadow: 0 0 8px rgba(107,240,255,0.7), 0 0 16px rgba(57,198,214,0.4);
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
      animation: petal-breathe 2s ease-in-out infinite;
    }
    .field:focus-within .field-icon { opacity: 1; }

    .field-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 26px;

    body { cursor: none; }
    .cursor-dot {
      position: fixed; top: 0; left: 0;
      width: 10px; height: 16px;
      border-radius: 51% 49% 47% 53% / 44% 45% 55% 69%;
      background: radial-gradient(circle at 35% 35%, rgba(167,255,238,0.95), rgba(57,198,214,0.6));
      box-shadow: 0 0 8px rgba(107,240,255,0.9), 0 0 20px rgba(57,198,214,0.5);
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%) rotate(-30deg);
      transition: transform 0.08s ease;
    }
    .cursor-trail {
      position: fixed; top: 0; left: 0;
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid rgba(107,240,255,0.3);
      pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
      transition: transform 0.18s ease;
    }

    .moon-ring {
      position: fixed; right: calc(28% - 28px); top: calc(6% - 28px);
      width: calc(158px + 56px); height: calc(158px + 56px);
      border-radius: 50%; border: 1px solid rgba(107,240,255,0.12);
      pointer-events: none; z-index: 2;
      animation: moon-ring-spin 25s linear infinite;
    }
    .moon-ring::before {
      content: ""; position: absolute; top: -3px; left: 50%;
      transform: translateX(-50%);
      width: 6px; height: 6px; background: rgba(167,255,238,0.9); border-radius: 50%;
      box-shadow: 0 0 8px rgba(107,240,255,1), 0 0 20px rgba(57,198,214,0.6);
    }
    .moon-ring::after {
      content: ""; position: absolute; bottom: -3px; right: 20%;
      width: 4px; height: 4px; background: rgba(255,230,200,0.7); border-radius: 50%;
      box-shadow: 0 0 6px rgba(255,206,0,0.8);
    }
    @keyframes moon-ring-spin { to { transform: rotate(360deg); } }
    .moon-ring-outer {
      position: fixed; right: calc(28% - 50px); top: calc(6% - 50px);
      width: calc(158px + 100px); height: calc(158px + 100px);
      border-radius: 50%; border: 1px solid rgba(57,198,214,0.05);
      border-top-color: rgba(107,240,255,0.15);
      pointer-events: none; z-index: 2;
      animation: moon-ring-spin 45s linear infinite reverse;
    }

    .fog-layer {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 28vh;
      background: linear-gradient(to top, rgba(0,30,35,0.7) 0%, rgba(0,20,25,0.4) 35%, rgba(57,198,214,0.04) 70%, transparent 100%);
      pointer-events: none; z-index: 8;
    }

    .botanical-quote {
      position: fixed; right: 4vw; top: 50%;
      transform: translateY(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-weight: 300;
      font-size: 0.72rem; line-height: 2.2; letter-spacing: 0.12em;
      color: rgba(57,198,214,0.22);
      writing-mode: vertical-rl; text-orientation: mixed;
      pointer-events: none; z-index: 20;
      animation: quote-breathe 6s ease-in-out infinite alternate;
    }
    @keyframes quote-breathe {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }

    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(0,50,58,0.88);
      border: 1px solid rgba(57,198,214,0.35);
      color: var(--teal-light);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      padding: 12px 28px;
      border-radius: 50px;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(57,198,214,0.15);
      z-index: 9000;
      opacity: 0;
      transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.5s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .login-btn.loading .btn-text { opacity: 0; }
    .login-btn.loading::after {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      width: 18px; height: 18px;
      margin: -9px 0 0 -9px;
      border: 2px solid rgba(167,255,238,0.3);
      border-top-color: var(--teal-light);
      border-radius: 50%;
      animation: spin-loader 0.7s linear infinite;
      background: none;
      transform: none;
    }
    @keyframes spin-loader { to { transform: rotate(360deg); } }

    @media (max-width: 680px) {
      .login-wrapper { left: 50%; top: 18%; transform: translateX(-50%); }
      .login-card { width: 90vw; }
      .blooms { transform: scale(0.65) translateX(0); }
    }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    .hidden-stage * { animation-play-state: paused !important; }

</style>
</head>

<script>
  
    /*  STAR CANVAS  */
    const cv = document.getElementById('starCanvas');
    const ctx = cv.getContext('2d');
    let stars = [];
    function initStars() {
      cv.width = innerWidth; cv.height = innerHeight; stars = [];
      const n = Math.floor(cv.width * cv.height / 2800);
      for (let i = 0; i < n; i++) stars.push({
        x: Math.random()*cv.width, y: Math.random()*cv.height*.72,
        r: Math.random()*1.3+.15, a: Math.random()*.75+.15,
        sp: Math.random()*.9+.3, ph: Math.random()*Math.PI*2,
        c: ['#fff','#a7ffee','#c8f0ff','#ffe8cc','#e0d0ff'][Math.floor(Math.random()*5)]
      });
    }
    function drawStars(t) {
      ctx.clearRect(0, 0, cv.width, cv.height);
      stars.forEach(s => {
        const tw = .5+.5*Math.sin(t*s.sp*.001+s.ph);
        ctx.globalAlpha = s.a*(.35+.65*tw);
        ctx.fillStyle = s.c; ctx.shadowColor = s.c; ctx.shadowBlur = s.r*5;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
    window.addEventListener('resize', initStars); initStars();

    /* ─── FIREFLIES ─── */
    const ffField = document.getElementById('fireflyField');
    const ffc = ['#23f0ff','#a7ffee','#ffffaa','#ffddff','#c0ffaa'];
    for (let i = 0; i < 28; i++) {
      const el = document.createElement('div'); el.className = 'firefly';
      const sz = .55+Math.random()*.95, c = ffc[i%ffc.length];
      const leftPct = i < 8 ? 2 + Math.random() * 22 : 35 + Math.random() * 60;
      el.style.cssText = `width:${sz}vmin;height:${sz}vmin;left:${leftPct}%;bottom:${8+Math.random()*65}%;background:${c};filter:blur(${sz*.25}vmin);box-shadow:0 0 ${sz*7}px ${c},0 0 ${sz*14}px ${c};animation-duration:${4.5+Math.random()*7.5}s;animation-delay:${Math.random()*11}s`;
      ffField.appendChild(el);
    }

    /* ─── FALLING PETALS ─── */
    const pfField = document.getElementById('petalFallField');
    const pfc = [['rgba(57,198,214,.62)','rgba(107,240,255,.4)'],['rgba(255,110,180,.58)','rgba(255,180,220,.4)'],['rgba(176,106,255,.52)','rgba(210,170,255,.36)'],['rgba(255,170,51,.52)','rgba(255,220,120,.36)'],['rgba(167,255,238,.52)','rgba(200,255,250,.36)']];
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div'); el.className = 'petal-fall';
      const w = 1.3+Math.random()*2.2, h = w*(1.2+Math.random()*.5), pair = pfc[i%pfc.length];
      el.style.cssText = `width:${w}vmin;height:${h}vmin;left:${Math.random()*100}%;background:linear-gradient(135deg,${pair[0]},${pair[1]});box-shadow:0 0 ${w*3}px ${pair[0]};animation-duration:${11+Math.random()*15}s;animation-delay:${Math.random()*20}s;filter:blur(${w*.07}vmin)`;
      pfField.appendChild(el);
    }

    /* ─── POLLEN ─── */
    const polField = document.getElementById('pollenField');
    const polc = ['#23f0ff','#fffb00','#ff9ff0','#a7ffee','#ffaa33','#c8a0ff'];
    for (let i = 0; i < 34; i++) {
      const el = document.createElement('div'); el.className = 'pollen';
      const sz = .25+Math.random()*.52;
      el.style.cssText = `width:${sz}vmin;height:${sz}vmin;left:${Math.random()*100}%;bottom:-5%;background:${polc[i%polc.length]};filter:blur(${sz*.3}vmin);animation-duration:${6+Math.random()*9}s;animation-delay:${Math.random()*10}s;box-shadow:0 0 ${sz*5}px ${polc[(i+2)%polc.length]}`;
      polField.appendChild(el);
    }

    /* ─── CARD FIREFLIES ─── */
    const card = document.querySelector('.login-card');
    const cff = ['#23f0ff','#a7ffee','#ffffaa','#ffddff','#c0ffaa','#ff9ff0'];
    for (let i = 0; i < 7; i++) {
      const el = document.createElement('div');
      el.className = 'card-firefly';
      const sz = 0.3 + Math.random() * 0.5;
      const c = cff[i % cff.length];
      const ffx = (Math.random() - 0.5) * 80;
      const ffy = -50 - Math.random() * 80;
      el.style.cssText = `width:${sz * 6}px;height:${sz * 6}px;left:${10 + Math.random() * 80}%;top:${20 + Math.random() * 60}%;background:${c};filter:blur(${sz}px);box-shadow:0 0 ${sz * 10}px ${c},0 0 ${sz * 20}px ${c};animation-duration:${5 + Math.random() * 7}s;animation-delay:${Math.random() * 10}s;--ffx:${ffx}px;--ffy:${ffy}px;`;
      card.appendChild(el);
    }

    document.querySelectorAll('.petal-shimmer').forEach((el,i) => el.style.animationDelay = `${(i*.27)%3.5}s`);
    document.querySelectorAll('.stamen').forEach((el,i) => { el.style.animationDelay = `${(i*.17)%2.2}s`; el.style.transformOrigin = '50% 3.5vmin'; });
    document.querySelectorAll('.dew').forEach((el,i) => el.style.animationDelay = `${(i*.62)%4.5}s`);

    /* ─── TIME GREETING ─── */
    const h = new Date().getHours();
    const g = h < 5 ? 'Late Night' : h < 12 ? 'Good Morning' : h < 17 ? 'Good Afternoon' : h < 21 ? 'Good Evening' : 'Good Night';
    document.getElementById('timeGreeting').textContent = g;

    /* ─── REMEMBER ME TOGGLE ─── */
    const rememberWrap = document.getElementById('rememberWrap');
    const rememberCheck = document.getElementById('rememberCheck');
    let remembered = false;
    function toggleRemember() {
      remembered = !remembered;
      rememberCheck.classList.toggle('checked', remembered);
      rememberWrap.setAttribute('aria-checked', remembered);
    }
    rememberWrap.addEventListener('click', toggleRemember);
    rememberWrap.addEventListener('keydown', e => { if(e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleRemember(); } });

    /* ─── LOGIN BUTTON ─── */
    const loginBtn = document.getElementById('loginBtn');
    const toast = document.getElementById('toast');

    function showToast(msg, duration = 2800) {
      toast.textContent = msg;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), duration);
    }

    loginBtn.addEventListener('click', () => {
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;
      if (!email) { showToast('✦ Please enter your email'); return; }
      if (!pw) { showToast('✦ Please enter your password'); return; }
      loginBtn.classList.add('loading');
      loginBtn.disabled = true;
      setTimeout(() => {
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
        showToast('✦ Welcome back to the garden');
      }, 1800);
    });

    /* ─── 3D CARD TILT ─── */
    const loginWrapper = document.querySelector('.login-wrapper');
    loginWrapper.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = (e.clientX - cx) / rect.width;
      const dy = (e.clientY - cy) / rect.height;
      card.style.transform = `rotateY(${dx * 6}deg) rotateX(${-dy * 5}deg) scale(1.01)`;
      card.style.transition = 'transform 0.1s ease';
    });
    loginWrapper.addEventListener('mouseleave', () => {
      card.style.transform = '';
      card.style.transition = 'transform 0.6s cubic-bezier(0.22,1,0.36,1)';
    });

    /* ─── CUSTOM CURSOR ─── */
    const dot = document.getElementById('cursorDot');
    const trail = document.getElementById('cursorTrail');
    let mx=0, my=0, tx=0, ty=0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; dot.style.left = mx+'px'; dot.style.top = my+'px'; });
    (function lerpCursor() {
      tx += (mx-tx)*0.12; ty += (my-ty)*0.12;
      trail.style.left = tx+'px'; trail.style.top = ty+'px';
      requestAnimationFrame(lerpCursor);
    })();

    /* ── BUTTERFLY ── */
    const bfCanvas  = document.getElementById('butterflyCanvas');
    const bfCtx     = bfCanvas.getContext('2d');
    const trailCanvas = document.getElementById('butterflyTrail');
    const tctx      = trailCanvas.getContext('2d');

    function resizeCanvases() {
      bfCanvas.width  = innerWidth;  bfCanvas.height = innerHeight;
      trailCanvas.width = innerWidth; trailCanvas.height = innerHeight;
    }
    window.addEventListener('resize', resizeCanvases);
    resizeCanvases();

    const WS = 1.18;
    const WC = {
      fw_base:'#020510',fw_border:'#08102a',fw_mid:'#0840b0',fw_bright:'#0d88e8',fw_apex:'#18c8f8',fw_tip:'#a0f0ff',
      hw_base:'#040214',hw_inner:'#12046a',hw_mid:'#1820c0',hw_outer:'#0890e0',hw_tail:'#ff90d0',hw_cream:'#ffe8c0',
      black:'#040408',vein_main:'rgba(0,0,0,0.70)',vein_sub:'rgba(0,0,0,0.40)',vein_hi:'rgba(255,255,255,0.22)',
      white:'#fffff8',cream:'#fffbd0',gold:'#ffcc18',amber:'#ff9010',red:'#e82010',coral:'#ff5030',
    };

    function hash(x, y) { let h = (Math.sin(x*127.1+y*311.7)*43758.5453)%1; return h<0?h+1:h; }

    function stippleScales(c, density, sizeRange, colFn) {
      const [sx,sy,sw,sh] = [-10,-110,115,130];
      for (let i=0;i<density;i++) {
        const rx=sx+hash(i,0)*sw,ry=sy+hash(i,1)*sh,r=sizeRange[0]+hash(i,2)*(sizeRange[1]-sizeRange[0]),rot=hash(i,3)*Math.PI;
        c.globalAlpha=0.06+hash(i,4)*0.10; c.fillStyle=colFn(rx,ry,i);
        c.save(); c.translate(rx,ry); c.rotate(rot); c.beginPath(); c.ellipse(0,0,r,r*0.6,0,0,Math.PI*2); c.fill(); c.restore();
      }
      c.globalAlpha=1;
    }

    function drawForewingSide(c, sp) {
      const s=WS;
      const fw=new Path2D();
      fw.moveTo(0,0);
      fw.bezierCurveTo(s*14,-s*22,s*48,-s*62,s*68,-s*96);
      fw.bezierCurveTo(s*76,-s*106,s*92,-s*102,s*88,-s*90);
      fw.bezierCurveTo(s*96,-s*76,s*102,-s*56,s*98,-s*36);
      fw.bezierCurveTo(s*96,-s*22,s*88,-s*10,s*78,s*2);
      fw.bezierCurveTo(s*64,s*14,s*42,s*22,s*14,s*16);
      fw.bezierCurveTo(s*6,s*13,s*1,s*7,0,0);
      fw.closePath();
      const baseG=c.createLinearGradient(s*5,0,s*92,-s*96);
      baseG.addColorStop(0,WC.fw_base);baseG.addColorStop(0.12,WC.fw_border);baseG.addColorStop(0.30,WC.fw_mid);
      baseG.addColorStop(0.52,WC.fw_bright);baseG.addColorStop(0.72,WC.fw_apex);baseG.addColorStop(1.0,WC.fw_tip);
      c.fillStyle=baseG; c.fill(fw);
      c.save(); c.clip(fw);
      stippleScales(c,180,[1.5,4.5],(rx,ry,i)=>{const t=(rx+10)/110,h=185+t*35+Math.sin(sp*2+i*0.3)*12;return`hsl(${h},100%,${55+t*25}%)`;});
      c.globalAlpha=1;
      const cells=[[s*74,-s*28,s*8.5,s*4.8,195,0.55],[s*82,-s*42,s*8,s*4.5,192,0.52],[s*88,-s*56,s*7.5,s*4.2,190,0.48],[s*90,-s*68,s*7,s*4,188,0.44],[s*89,-s*80,s*6.5,s*3.8,186,0.40],[s*62,-s*22,s*9,s*5,200,0.42],[s*70,-s*36,s*9.5,s*5.2,198,0.45],[s*76,-s*50,s*9,s*5,196,0.42],[s*80,-s*62,s*8.5,s*4.8,194,0.38],[s*82,-s*74,s*8,s*4.5,192,0.35],[s*48,-s*18,s*9.5,s*5.5,205,0.36],[s*56,-s*30,s*10,s*5.8,202,0.38],[s*64,-s*44,s*9.5,s*5.5,200,0.36],[s*70,-s*56,s*9,s*5,198,0.32],[s*30,-s*14,s*8,s*4.5,210,0.28],[s*38,-s*24,s*8.5,s*5,208,0.30],[s*46,-s*36,s*9,s*5.2,206,0.32],[s*54,-s*48,s*8.5,s*5,204,0.28],[s*16,-s*10,s*6.5,s*3.8,215,0.20],[s*22,-s*18,s*7,s*4,213,0.22],[s*30,-s*28,s*7.5,s*4.2,211,0.24]];
      cells.forEach(([cx,cy,rx,ry,hue,alpha])=>{const shimAlpha=alpha*(0.7+0.3*Math.sin(sp*5+cx*0.04+cy*0.02)),shimHue=hue+Math.sin(sp*3+cx*0.03)*18,cg=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(rx,ry));cg.addColorStop(0,`hsla(${shimHue},100%,85%,${shimAlpha})`);cg.addColorStop(0.5,`hsla(${shimHue-8},100%,72%,${shimAlpha*0.7})`);cg.addColorStop(1,`hsla(${shimHue-15},95%,60%,0)`);c.fillStyle=cg;c.beginPath();c.ellipse(cx,cy,rx,ry,Math.atan2(cy,cx)*0.25,0,Math.PI*2);c.fill();});

    function getWaypoints(){const W=innerWidth,H=innerHeight;return[{x:W*0.80,y:H*0.26},{x:W*0.66,y:H*0.38},{x:W*0.76,y:H*0.54},{x:W*0.60,y:H*0.44},{x:W*0.72,y:H*0.28},{x:W*0.88,y:H*0.42},{x:W*0.62,y:H*0.60},{x:W*0.82,y:H*0.20},{x:W*0.92,y:H*0.34},{x:W*0.70,y:H*0.50}];}
    let wpts=getWaypoints();
    window.addEventListener('resize',()=>{wpts=getWaypoints();});
    targetX=wpts[0].x;targetY=wpts[0].y;

    const dustParticles=[];
    const dustColors=['rgba(107,240,255,','rgba(180,140,255,','rgba(255,110,180,','rgba(255,210,80,','rgba(150,255,200,','rgba(220,180,255,'];
    function spawnDust(x,y,count=2){for(let i=0;i<count;i++){dustParticles.push({x:x+(Math.random()-0.5)*28,y:y+(Math.random()-0.5)*18,vx:(Math.random()-0.5)*0.7,vy:-Math.random()*0.8-0.15,r:Math.random()*3.8+0.7,life:0.9+Math.random()*0.4,decay:0.009+Math.random()*0.009,col:dustColors[Math.floor(Math.random()*dustColors.length)],spin:(Math.random()-0.5)*0.12,sparkle:Math.random()<0.3});}}

    function drawDust(){tctx.clearRect(0,0,trailCanvas.width,trailCanvas.height);for(let i=dustParticles.length-1;i>=0;i--){const p=dustParticles[i];p.x+=p.vx+windDrift.x*0.3;p.y+=p.vy+windDrift.y*0.3;p.vx*=0.98;p.vy*=0.98;p.life-=p.decay;if(p.life<=0){dustParticles.splice(i,1);continue;}const a=Math.min(p.life,0.88);tctx.globalAlpha=a*0.72;tctx.shadowColor=p.col+'1)';tctx.shadowBlur=p.r*(p.sparkle?14:8);tctx.fillStyle=p.col+a.toFixed(2)+')';tctx.beginPath();if(p.sparkle){tctx.save();tctx.translate(p.x,p.y);tctx.rotate(p.life*6);const sr=p.r;tctx.moveTo(0,-sr*2);tctx.lineTo(sr*0.4,-sr*0.4);tctx.lineTo(sr*2,0);tctx.lineTo(sr*0.4,sr*0.4);tctx.lineTo(0,sr*2);tctx.lineTo(-sr*0.4,sr*0.4);tctx.lineTo(-sr*2,0);tctx.lineTo(-sr*0.4,-sr*0.4);tctx.closePath();tctx.fill();tctx.restore();}else{tctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);tctx.fill();}}tctx.globalAlpha=1;tctx.shadowBlur=0;}

    function drawButterfly(x,y,heading,flapP,alpha,shim){
      bfCtx.clearRect(0,0,bfCanvas.width,bfCanvas.height);if(alpha<=0)return;
      const raw=Math.sin(flapP),eased=raw>=0?Math.pow(raw,0.65):-Math.pow(-raw,1.5),openness=1-Math.abs(eased),flapScale=Math.max(0.04,openness);
      bfCtx.save();bfCtx.globalAlpha=alpha;bfCtx.translate(x,y);bfCtx.rotate(heading);
      if(openness>0.2){const auraR=120*openness,aura=bfCtx.createRadialGradient(0,0,3,0,5,auraR),aHue=(shim*200)%360;aura.addColorStop(0,`hsla(${aHue},95%,85%,0.28)`);aura.addColorStop(0.28,`hsla(${aHue+30},90%,75%,0.14)`);aura.addColorStop(0.6,`hsla(${aHue+60},85%,65%,0.06)`);aura.addColorStop(1,'transparent');bfCtx.save();bfCtx.globalCompositeOperation='screen';bfCtx.globalAlpha=alpha*0.8;bfCtx.fillStyle=aura;bfCtx.beginPath();bfCtx.arc(0,5,auraR,0,Math.PI*2);bfCtx.fill();bfCtx.restore();bfCtx.globalAlpha=alpha;}
      if(openness<0.3){const glow=0.3-openness;bfCtx.save();bfCtx.globalCompositeOperation='screen';bfCtx.globalAlpha=alpha*glow*0.5;bfCtx.shadowColor=`hsla(${(shim*300)%360},100%,80%,1)`;bfCtx.shadowBlur=18;bfCtx.strokeStyle=`hsla(${(shim*300)%360},100%,85%,0.4)`;bfCtx.lineWidth=2;bfCtx.beginPath();bfCtx.ellipse(0,0,4,40,0,0,Math.PI*2);bfCtx.stroke();bfCtx.restore();bfCtx.globalAlpha=alpha;}
      bfCtx.save();bfCtx.scale(-flapScale,1);drawHindwingSide(bfCtx,shim);drawForewingSide(bfCtx,shim);bfCtx.restore();
      bfCtx.save();bfCtx.scale(flapScale,1);drawHindwingSide(bfCtx,shim);drawForewingSide(bfCtx,shim);bfCtx.restore();
      drawBody(bfCtx);
      if(openness>0.18){const shimA=0.09+0.07*Math.sin(shim*3.8),shimH=(shim*240+170)%360;bfCtx.save();bfCtx.globalCompositeOperation='screen';bfCtx.globalAlpha=alpha*shimA*openness;const sG=bfCtx.createLinearGradient(-110,-110,110,80);sG.addColorStop(0,`hsla(${shimH},100%,82%,1)`);sG.addColorStop(0.4,`hsla(${shimH+45},100%,74%,0.6)`);sG.addColorStop(0.75,`hsla(${shimH+90},92%,66%,0.3)`);sG.addColorStop(1,`hsla(${shimH+120},88%,60%,0)`);bfCtx.fillStyle=sG;bfCtx.fillRect(-115,-115,230,210);bfCtx.restore();bfCtx.globalAlpha=alpha;}
      bfCtx.restore();
    }

    let frameN=0;
    function updateFlight(t){
      frameN++;shimmerPhase=t*0.00075;
      if(appearAlpha<1)appearAlpha=Math.min(1,appearAlpha+0.007);
      windPhase+=0.008;windDrift.x=Math.sin(windPhase*0.7)*0.22;windDrift.y=Math.cos(windPhase*0.5)*0.12;
      if(isResting){restTimer++;flapPhase+=0.022;const bob=Math.sin(t*0.0018)*2.5+Math.sin(t*0.0031)*1.2,sway=Math.sin(t*0.0009)*1.8;drawButterfly(bx+sway,by+bob,bHeading+sway*0.012,flapPhase,appearAlpha,shimmerPhase);if(restTimer>restDuration){isResting=false;isSpiralMode=false;wpIndex=(wpIndex+1)%wpts.length;targetX=wpts[wpIndex].x;targetY=wpts[wpIndex].y;}if(frameN%18===0)spawnDust(bx,by,1);return;}
      if(isSpiralMode){spiralTimer++;spiralAngle+=0.038;const sr=28+Math.sin(spiralTimer*0.04)*12;bx+=(Math.cos(spiralAngle)*sr-bvx)*0.08+windDrift.x;by+=(Math.sin(spiralAngle)*sr*0.55-bvy)*0.08+windDrift.y;bvx*=0.85;bvy*=0.85;flapPhase+=0.10;const travelAngle=Math.atan2(bvy+Math.sin(spiralAngle)*0.5,bvx+Math.cos(spiralAngle)*0.5)+Math.PI/2;bHeading+=(travelAngle-bHeading)*0.06;if(frameN%3===0)spawnDust(bx,by,2);drawButterfly(bx,by,bHeading,flapPhase,appearAlpha,shimmerPhase);if(spiralTimer>90+Math.random()*80){isSpiralMode=false;wpIndex=(wpIndex+1)%wpts.length;targetX=wpts[wpIndex].x;targetY=wpts[wpIndex].y;}return;}
      flightTimer++;
      const dx=targetX-bx,dy=targetY-by,dist=Math.sqrt(dx*dx+dy*dy),spd=Math.sqrt(bvx*bvx+bvy*bvy),targetFlapSpeed=isGliding?0.035:(0.10+spd*0.020);
      flapSpeed+=(targetFlapSpeed-flapSpeed)*0.08;flapPhase+=flapSpeed;
      if(!isGliding&&Math.sin(flapPhase)>0.98&&Math.random()<0.08){isGliding=true;glidePhase=0;}
      if(isGliding){glidePhase++;if(glidePhase>18+Math.random()*14)isGliding=false;}
      const angle=Math.atan2(dy,dx),perpX=Math.cos(angle+Math.PI/2),perpY=Math.sin(angle+Math.PI/2),flutter=Math.sin(flapPhase*1.6)*2.2,steer=isGliding?0.008:0.024;
      bvx+=dx*steer+perpX*flutter*0.055+windDrift.x*0.4;bvy+=dy*steer+perpY*flutter*0.055+windDrift.y*0.4;const drag=isGliding?0.94:0.87;bvx*=drag;bvy*=drag;
      bx+=bvx;by+=bvy;
      const travelAngle=Math.atan2(bvy+perpY*0.02,bvx+perpX*0.02)+Math.PI/2;let headingDiff=travelAngle-bHeading;while(headingDiff>Math.PI)headingDiff-=Math.PI*2;while(headingDiff<-Math.PI)headingDiff+=Math.PI*2;bHeading+=headingDiff*0.07;
      const flapDown=Math.sin(flapPhase)>0.6;if(frameN%(isGliding?8:flapDown?3:5)===0)spawnDust(bx,by,flapDown?3:1);
      drawButterfly(bx,by,bHeading,flapPhase,appearAlpha,shimmerPhase);
      if(dist<20||flightTimer>380){flightTimer=0;const rand=Math.random();if(rand<0.22){isResting=true;restTimer=0;restDuration=80+Math.random()*200;}else if(rand<0.38){isSpiralMode=true;spiralTimer=0;spiralAngle=Math.atan2(bvy,bvx);}else{wpIndex=(wpIndex+1)%wpts.length;targetX=wpts[wpIndex].x;targetY=wpts[wpIndex].y;}}
    }

    (function loop(t){drawStars(t);drawDust();updateFlight(t);requestAnimationFrame(loop);})(0);
    setTimeout(()=>document.body.classList.remove('hidden-stage'),100);

  </script>
</body>
